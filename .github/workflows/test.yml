name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Compile production sources
        run: |
          mkdir -p out/production
          javac -cp "src/Dependencies/compiler-2.30.jar" \
                -d out/production \
                $(find src -name "*.java")

      - name: Compile test sources
        run: |
          mkdir -p out/test
          DEPS="src/Dependencies/compiler-2.30.jar:\
          src/Dependencies/test/junit-jupiter-api-5.10.2.jar:\
          src/Dependencies/test/junit-platform-commons-1.10.2.jar:\
          src/Dependencies/test/opentest4j-1.3.0.jar:\
          src/Dependencies/test/apiguardian-api-1.1.2.jar"
          javac -cp "out/production:${DEPS}" \
                -d out/test \
                $(find test -name "*.java")

      - name: Run tests
        run: |
          DEPS="src/Dependencies/compiler-2.30.jar:\
          src/Dependencies/test/junit-jupiter-api-5.10.2.jar:\
          src/Dependencies/test/junit-platform-commons-1.10.2.jar:\
          src/Dependencies/test/opentest4j-1.3.0.jar:\
          src/Dependencies/test/apiguardian-api-1.1.2.jar"
          LAUNCHER="src/Dependencies/test/junit-platform-console-standalone-1.10.2.jar"
          java -cp "out/test:out/production:${DEPS}:${LAUNCHER}" \
               org.junit.platform.console.ConsoleLauncher \
               --select-class=ModelCheckerTest
